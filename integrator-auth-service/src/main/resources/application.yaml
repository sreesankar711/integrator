server:
  port: 8081
  shutdown: graceful

spring:
  config:
    import: "optional:file:.env[.properties],optional:file:../.env[.properties]"
  application:
    name: integrator-auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/integrator?currentSchema=auth
    username: ${AUTH_DB_USERNAME}
    password: ${AUTH_DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auth
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    schemas: auth
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 30s

jwt:
  private-key-path: ${JWT_PRIVATE_KEY_PATH}
  public-key-path: ${JWT_PUBLIC_KEY_PATH}
  access-token-expiry: PT15M
  refresh-token-expiry: P7D

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

bootstrap:
  admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
    username: ${BOOTSTRAP_ADMIN_USERNAME:}
    email: ${BOOTSTRAP_ADMIN_EMAIL:}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}