server:
  port: 8080
  shutdown: graceful

spring:
  config:
    import: "optional:file:.env[.properties],optional:file:../.env[.properties]"
  application:
    name: integrator-gateway
  reactor:
    context-propagation: auto
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: integrator-gateway-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: com.integrator.common.event
        spring.json.value.default.type: com.integrator.common.event.RouteEvent
        spring.json.use.type.headers: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s
      connect-timeout: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
          transport: http
    logging:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:http://localhost:4318/v1/logs}
          transport: http
  logging:
    export:
      otlp:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

gateway:
  route-service-url: http://localhost:8082
  route-events-topic: route.events
  route-refresh-interval: 30000