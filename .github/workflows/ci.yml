name: Java unit test and code quality

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build, test, coverage, and analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Create JWT key files
        run: |
          mkdir -p .ci-secrets
          printf "%s" "${JWT_PRIVATE_KEY}" > .ci-secrets/rsa_private.pem
          printf "%s" "${JWT_PUBLIC_KEY}" > .ci-secrets/rsa_public.pem
        env:
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}

      - name: Build, test, JaCoCo, and Sonar analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          AUTH_DB_USERNAME: ${{ secrets.AUTH_DB_USERNAME }}
          AUTH_DB_PASSWORD: ${{ secrets.AUTH_DB_PASSWORD }}
          JWT_PRIVATE_KEY_PATH: file:.ci-secrets/rsa_private.pem
          JWT_PUBLIC_KEY_PATH: file:.ci-secrets/rsa_public.pem
        run: >
          ./mvnw -B clean verify
          org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.projectKey=sreesankar711_integrator
          -Dsonar.organization=sreesankar711
          --no-transfer-progress

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            **/target/site/jacoco/**
            **/target/jacoco.exec

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/**

      - name: Clean up JWT key files
        if: always()
        run: rm -rf .ci-secrets
